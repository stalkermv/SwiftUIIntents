name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  swift-test:
    name: Swift Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build package
        run: swift build

      - name: Run tests
        run: swift test --parallel

  documentation:
    name: DocC Build Check
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Build documentation
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation --target SwiftUIIntents \
            --output-path ./docs \
            --transform-for-static-hosting \
            --hosting-base-path SwiftUIIntents

  apple-platforms:
    name: Apple Platform Compile Checks
    runs-on: macos-15

    strategy:
      fail-fast: false
      matrix:
        destination:
          - "generic/platform=iOS Simulator"
          - "platform=macOS"
          - "generic/platform=tvOS Simulator"
          - "generic/platform=watchOS Simulator"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Build for destination
        run: |
          xcodebuild \
            -workspace .swiftpm/xcode/package.xcworkspace \
            -scheme SwiftUIIntents \
            -destination "${{ matrix.destination }}" \
            build
